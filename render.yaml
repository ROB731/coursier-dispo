services:
  - type: web
    name: dispo-coursier-api
    runtime: node
    plan: starter
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    disk:
      name: uploads
      mountPath: /opt/render/project/src/apps/api/uploads
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 12h
      - key: FRONTEND_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production
      - key: SEED_SUPER_ADMIN_IDENTIFIANT
        sync: false
      - key: SEED_SUPER_ADMIN_MOT_DE_PASSE
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CONTACT_EMAIL
        sync: false
